<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Hexagon -->
  <path d="M256 48L443.08 156V356L256 464L68.92 356V156L256 48Z" stroke="url(#grad)" stroke-width="36" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Inner Medical Cross / Circuit intersection -->
  <path d="M256 160V352M160 256H352C352 256 360 170 256 160C152 170 160 256 160 256Z" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  
  <!-- Central Pulse Node -->
  <circle cx="256" cy="256" r="40" fill="#22d3ee" filter="url(#glow)"/>
</svg>
